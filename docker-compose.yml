services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio -d portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://portfolio:portfolio@postgres:5432/portfolio
    ports: ["8000:8000"]
    volumes: ["backend_logs:/app/logs"]
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args: { NEXT_PUBLIC_API_URL: "http://localhost:8000" }
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:

